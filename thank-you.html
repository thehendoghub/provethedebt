<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thanks for supporting ProveTheDebt</title>
    <style>
      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #fff;
        text-align: center;
        padding: 2rem;
      }
      .card {
        background: rgba(15, 23, 42, 0.8);
        padding: 2.5rem;
        border-radius: 1.5rem;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }
      button,
      a {
        color: #fff;
      }
      .spinner {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        opacity: 0.8;
      }
      .error {
        color: #fecdd3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Processing your access…</h1>
      <p>Give us a second while we confirm your payment.</p>
      <div id="status" class="spinner">Verifying Stripe session…</div>
      <p id="next" class="hidden"></p>
    </div>

    <script>
      const ACCESS_KEY = "ptd_access";

      function qs(key) {
        return new URLSearchParams(window.location.search).get(key);
      }

      async function verifySession(sessionId) {
        const status = document.getElementById("status");
        try {
          const res = await fetch(`/api/verify?session_id=${encodeURIComponent(sessionId)}`);
          if (!res.ok) throw new Error("Verification failed");
          const data = await res.json();
          if (!data.ok) throw new Error("Payment not confirmed");

          localStorage.setItem(ACCESS_KEY, JSON.stringify(data.access));
          status.textContent = "You're all set! Redirecting…";
          setTimeout(() => {
            window.location.href = "/app.html";
          }, 1200);
        } catch (error) {
          console.error(error);
          status.classList.add("error");
          status.textContent = "We couldn't verify your payment automatically.";
          const next = document.getElementById("next");
          next.classList.remove("hidden");
          next.innerHTML = `Copy your session ID (${sessionId}) and email support@provethedebt.com.`;
        }
      }

      const sessionId = qs("session_id");
      if (!sessionId) {
        document.getElementById("status").textContent = "Missing session ID. Please return to checkout.";
      } else {
        verifySession(sessionId);
      }
    </script>
  </body>
</html>
